name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: 1. コードのチェックアウト
        uses: actions/checkout@v4

      - name: 2. Pythonのセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 3. 依存ライブラリのインストール
        run: |
          python -m pip install --upgrade pip
          pip install reflex

      # 💡 課題4：Secretの長さだけ確認（値そのものはマスクされて安全）
      - name: 4. Secretの長さ確認（応用課題4）
        env:
          MY_SECRET: ${{ secrets.VITE_API_URL }}
        run: |
          echo "Length is ${#MY_SECRET}"
